name: 🎬 YouTube Automation — Daily Upload

on:
  schedule:
    # Runs every day at 1:00 PM UTC
    # GitHub Actions then schedules each language at its peak time
    - cron: "0 13 * * *"

  # Allow manual trigger (for testing)
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run without uploading (dry run)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  create-and-upload:
    name: Create & Upload Videos (All Languages)
    runs-on: ubuntu-latest    # Free runner — 7GB RAM, 2 vCPUs, 14GB storage

    timeout-minutes: 180      # 3 hours max (GitHub free tier allows 2000 min/month)

    steps:
      # ─── 1. Checkout repo ───────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Set up Python ───────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ─── 3. Install system dependencies ─────────────────────
      - name: 🔧 Install system packages (ffmpeg + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-noto \
            fonts-noto-cjk \
            fonts-freefont-ttf \
            imagemagick \
            --no-install-recommends
          # Verify ffmpeg
          ffmpeg -version | head -1
          echo "✅ System packages installed"

      # ─── 4. Install Python packages ─────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python packages installed"

      # ─── 5. Run the pipeline ────────────────────────────────
      - name: 🚀 Run YouTube Automation Pipeline
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CREDS_B64:  ${{ secrets.YOUTUBE_CREDS_B64 }}
          YOUTUBE_TOKEN_B64:  ${{ secrets.YOUTUBE_TOKEN_B64 }}
        run: |
          cd src
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            echo "🧪 DRY RUN MODE — No uploads"
            python pipeline.py --test
          else
            echo "🚀 LIVE MODE — Creating and uploading videos"
            python pipeline.py
          fi

      # ─── 6. Upload logs and video info as artifacts ─────────
      - name: 📊 Upload pipeline artifacts
        if: always()   # Run even if pipeline fails
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            output/
            used_topics.json
          retention-days: 7

      # ─── 7. Commit updated used_topics.json ─────────────────
      - name: 💾 Save used topics back to repo
        if: success()
        run: |
          git config user.name  "HistoryVault Bot"
          git config user.email "bot@historyvault.ai"
          git add used_topics.json || true
          git diff --staged --quiet || git commit -m "🤖 Update used topics [skip ci]"
          git push || true

      # ─── 8. Notify on failure ───────────────────────────────
      - name: ❌ Report failure
        if: failure()
        run: |
          echo "Pipeline failed! Check the logs above."
          echo "Common issues:"
          echo "  - GROQ_API_KEY not set or expired"
          echo "  - YOUTUBE_TOKEN_B64 needs refresh (re-run auth_setup.py)"
          echo "  - Pexels API rate limit"
          exit 1
